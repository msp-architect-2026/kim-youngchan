prometheus:
  prometheusSpec:
    replicas: 1
    retention: 7d
    retentionSize: "5GB"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    additionalScrapeConfigs:
      - job_name: 'dropx-services'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['dropx']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
    
    # Alert Rules 추가
    additionalPrometheusRulesMap:
      dropx-alerts:
        groups:
          - name: dropx-pod-health
            interval: 30s
            rules:
              - alert: DropXPodDown
                expr: up{job="dropx-services"} == 0
                for: 1m
                labels:
                  severity: critical
                  service: dropx
                annotations:
                  summary: "DropX 서비스 Pod가 다운되었습니다"
                  description: "{{ $labels.namespace }}/{{ $labels.pod }} Pod가 1분 이상 응답하지 않습니다."
              
              - alert: DropXPodRestarting
                expr: rate(kube_pod_container_status_restarts_total{namespace="dropx"}[15m]) > 0
                for: 5m
                labels:
                  severity: warning
                  service: dropx
                annotations:
                  summary: "DropX Pod가 재시작되고 있습니다"
                  description: "{{ $labels.namespace }}/{{ $labels.pod }} Pod가 15분 내 재시작되었습니다."
          
          - name: dropx-performance
            interval: 30s
            rules:
              - alert: DropXHighLatency
                expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="dropx-services"}[5m])) > 1
                for: 5m
                labels:
                  severity: warning
                  service: dropx
                annotations:
                  summary: "DropX 서비스 응답 시간이 느립니다"
                  description: "{{ $labels.namespace }}/{{ $labels.pod }}의 95 percentile 응답 시간이 1초를 초과합니다 (현재: {{ $value }}s)"
              
              - alert: DropXHighErrorRate
                expr: rate(http_requests_total{job="dropx-services",status=~"5.."}[5m]) > 0.05
                for: 5m
                labels:
                  severity: critical
                  service: dropx
                annotations:
                  summary: "DropX 서비스 에러율이 높습니다"
                  description: "{{ $labels.namespace }}/{{ $labels.pod }}의 5xx 에러율이 5%를 초과합니다"
          
          - name: dropx-resources
            interval: 30s
            rules:
              - alert: DropXHighCPU
                expr: rate(container_cpu_usage_seconds_total{namespace="dropx",container!=""}[5m]) > 0.8
                for: 10m
                labels:
                  severity: warning
                  service: dropx
                annotations:
                  summary: "DropX Pod CPU 사용률이 높습니다"
                  description: "{{ $labels.namespace }}/{{ $labels.pod }} CPU 사용률이 80%를 초과합니다"
              
              - alert: DropXHighMemory
                expr: container_memory_usage_bytes{namespace="dropx",container!=""} / container_spec_memory_limit_bytes{namespace="dropx",container!=""} > 0.9
                for: 10m
                labels:
                  severity: warning
                  service: dropx
                annotations:
                  summary: "DropX Pod 메모리 사용률이 높습니다"
                  description: "{{ $labels.namespace }}/{{ $labels.pod }} 메모리 사용률이 90%를 초과합니다"

grafana:
  enabled: true
  replicas: 1
  adminPassword: "dropx1234"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  service:
    type: LoadBalancer
  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi

alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  config:
    global:
      resolve_timeout: 5m
      slack_api_url: 'https://hooks.slack.com/services/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'
    
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'slack-notifications'
      routes:
        - match:
            severity: critical
          receiver: 'slack-critical'
          continue: true
        - match:
            severity: warning
          receiver: 'slack-notifications'
    
    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - channel: '#dropx-alerts'
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: |
              *Summary:* {{ .CommonAnnotations.summary }}
              *Description:* {{ .CommonAnnotations.description }}
              *Details:*
              {{ range .Alerts }}
                • *Alert:* {{ .Labels.alertname }}
                • *Severity:* {{ .Labels.severity }}
                • *Namespace:* {{ .Labels.namespace }}
                • *Pod:* {{ .Labels.pod }}
                • *Started:* {{ .StartsAt }}
              {{ end }}
            send_resolved: true
      
      - name: 'slack-critical'
        slack_configs:
          - channel: '#dropx-critical'
            title: '🚨 [CRITICAL] {{ .CommonLabels.alertname }}'
            text: |
              *Summary:* {{ .CommonAnnotations.summary }}
              *Description:* {{ .CommonAnnotations.description }}
              *Details:*
              {{ range .Alerts }}
                • *Alert:* {{ .Labels.alertname }}
                • *Severity:* {{ .Labels.severity }}
                • *Namespace:* {{ .Labels.namespace }}
                • *Pod:* {{ .Labels.pod }}
                • *Started:* {{ .StartsAt }}
              {{ end }}
            send_resolved: true

kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
