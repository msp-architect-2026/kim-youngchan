apiVersion: v1
kind: ConfigMap
metadata:
  name: dropx-config
  namespace: {{ .Values.global.namespace }}
data:
  MYSQL_HOST: {{ .Values.config.mysqlHost | quote }}
  MYSQL_PORT: {{ .Values.config.mysqlPort | quote }}
  MYSQL_DB: {{ .Values.config.mysqlDb | quote }}
  REDIS_HOST: {{ .Values.config.redisHost | quote }}
  REDIS_PORT: {{ .Values.config.redisPort | quote }}
  APP_ENV: {{ .Values.config.appEnv | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  RESERVE_TOKEN_TTL: {{ .Values.config.reserveTokenTtlSec | quote }}
  ORDER_LOCK_TTL: {{ .Values.config.orderLockTtlSec | quote }}
  METRICS_PORT: {{ .Values.config.metricsPort | quote }}
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "40"
  REDIS_MAX_CONNECTIONS: "100"
  CACHE_TTL: "300"
  REDIS_DB: "0"