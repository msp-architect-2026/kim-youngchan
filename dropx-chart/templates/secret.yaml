apiVersion: v1
kind: Secret
metadata:
  name: dropx-secret
  namespace: {{ .Values.global.namespace }}
  annotations:
    # 1. ArgoCD 앱 삭제 시에도 클러스터 내 이 Secret은 지우지 않고 보존합니다.
    argocd.argoproj.io/sync-options: PreserveResourcesOnDeletion=true
type: Opaque
# ⚠️ values.yaml 의 secret 섹션에 실 값 입력 후 helm upgrade
# Git에 실 값 절대 커밋 금지 (현재는 수동 생성 후 ArgoCD ignoreDifferences 설정 권장)
stringData:
  MYSQL_USER: {{ .Values.secret.mysqlUser | quote }}
  MYSQL_PASSWORD: {{ .Values.secret.mysqlPassword | quote }}
  MYSQL_ROOT_PASSWORD: {{ .Values.secret.mysqlRootPassword | quote }}
  JWT_SECRET_KEY: {{ .Values.secret.jwtSecretKey | quote }}
  REGISTRY_USER: {{ .Values.secret.registryUser | quote }}
  REGISTRY_PASSWORD: {{ .Values.secret.registryPassword | quote }}