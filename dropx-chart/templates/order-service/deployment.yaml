{{- if .Values.orderService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: order-service
    app.kubernetes.io/part-of: dropx
spec:
  replicas: {{ .Values.orderService.replicas }}
  selector:
    matchLabels:
      app: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.config.metricsPort | quote }}
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: dropx-app-sa
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: order-service
          image: "{{ .Values.orderService.image }}:{{ .Values.orderService.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
            - name: metrics
              containerPort: 8001
          env:
            # ── MySQL (order-service 키 형식: UPPER_CASE) ─────────────
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: MYSQL_PORT
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: MYSQL_DB
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: dropx-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dropx-secret
                  key: MYSQL_PASSWORD
            # ── Redis ────────────────────────────────────────────────
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: REDIS_PORT
            # ── JWT ──────────────────────────────────────────────────
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dropx-secret
                  key: JWT_SECRET_KEY
            # ── 공통 ─────────────────────────────────────────────────
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: APP_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: LOG_LEVEL
            - name: RESERVE_TOKEN_TTL
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: RESERVE_TOKEN_TTL
            - name: ORDER_LOCK_TTL
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: ORDER_LOCK_TTL
            - name: METRICS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: METRICS_PORT
          resources:
            requests:
              cpu: {{ .Values.orderService.resources.requests.cpu | quote }}
              memory: {{ .Values.orderService.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.orderService.resources.limits.cpu | quote }}
              memory: {{ .Values.orderService.resources.limits.memory | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: order-service
    app.kubernetes.io/part-of: dropx
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 80
      targetPort: 8000
    - name: metrics
      port: 8001
      targetPort: 8001
{{- end }}
