{{- if .Values.orderService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: order-service
    app.kubernetes.io/part-of: dropx
spec:
  replicas: {{ .Values.orderService.replicas }}
  selector:
    matchLabels:
      app: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.config.metricsPort | quote }}
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: dropx-app-sa
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: order-service
          image: "{{ .Values.orderService.image }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
            - name: metrics
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: dropx-config
            - secretRef:
                name: dropx-secret
          resources:
            requests:
              cpu: {{ .Values.orderService.resources.requests.cpu | quote }}
              memory: {{ .Values.orderService.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.orderService.resources.limits.cpu | quote }}
              memory: {{ .Values.orderService.resources.limits.memory | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: order-service
    app.kubernetes.io/part-of: dropx
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 80
      targetPort: 8000
    - name: metrics
      port: 8001
      targetPort: 8001
{{- end }}