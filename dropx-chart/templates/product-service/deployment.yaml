{{- if .Values.productService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: product-service
    app.kubernetes.io/part-of: dropx
spec:
  replicas: {{ .Values.productService.replicas }}
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.config.metricsPort | quote }}
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: dropx-app-sa
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: product-service
          image: "{{ .Values.productService.image }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
            - name: metrics
              containerPort: 8001
          env:
            # ── MySQL (product-service 키 형식: DB_ prefix) ───────────
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: MYSQL_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: MYSQL_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: MYSQL_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: dropx-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dropx-secret
                  key: MYSQL_PASSWORD
            # ── Redis ────────────────────────────────────────────────
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: REDIS_PORT
            # ── JWT ──────────────────────────────────────────────────
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dropx-secret
                  key: JWT_SECRET_KEY
            # ── 공통 ─────────────────────────────────────────────────
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: APP_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: LOG_LEVEL
            - name: METRICS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dropx-config
                  key: METRICS_PORT
          resources:
            requests:
              cpu: {{ .Values.productService.resources.requests.cpu | quote }}
              memory: {{ .Values.productService.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.productService.resources.limits.cpu | quote }}
              memory: {{ .Values.productService.resources.limits.memory | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: product-service
    app.kubernetes.io/part-of: dropx
spec:
  selector:
    app: product-service
  ports:
    - name: http
      port: 80
      targetPort: 8000
    - name: metrics
      port: 8001
      targetPort: 8001
{{- end }}
