################################################################################
# ServiceAccount — 일반 앱 (최소 권한)
################################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dropx-app-sa
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/part-of: dropx
---
################################################################################
# ServiceAccount — Admin (kill-pod 전용)
################################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-admin-sa
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/part-of: dropx
---
################################################################################
# Role — Pod 삭제 권한 (namespace 범위)
################################################################################
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-killer-role
  namespace: {{ .Values.global.namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
################################################################################
# RoleBinding
################################################################################
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: order-admin-pod-killer
  namespace: {{ .Values.global.namespace }}
subjects:
  - kind: ServiceAccount
    name: order-admin-sa
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: pod-killer-role
  apiGroup: rbac.authorization.k8s.io