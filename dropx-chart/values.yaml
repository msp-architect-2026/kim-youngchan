  enabled: true          # мқҙлҜём§Җ мӨҖл№„ мҷ„лЈҢ нӣ„ trueлЎң ліҖкІҪ
  image: "192.168.10.100:5050/root/ci/dropx-auth"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "400m"
      memory: "256Mi"

# в”Җв”Җ Product Service в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
productService:
  enabled: true         # мқҙлҜём§Җ мӨҖл№„ мҷ„лЈҢ нӣ„ trueлЎң ліҖкІҪ
  image: "192.168.10.100:5050/root/ci/dropx-product"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "400m"
      memory: "256Mi"

# в”Җв”Җ Order Service в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
orderService:
  enabled: true         # мқҙлҜём§Җ мӨҖл№„ мҷ„лЈҢ нӣ„ trueлЎң ліҖкІҪ
  image: "192.168.10.100:5050/root/ci/dropx-order"
  replicas: 1
