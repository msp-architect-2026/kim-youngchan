# DropX Helm Values
# мқҙ нҢҢмқј н•ҳлӮҳм—җм„ң лӘЁл“  нҷҳкІҪ м„Өм •мқ„ кҙҖлҰ¬н•©лӢҲлӢӨ.
# ArgoCDлҠ” мқҙ values.yamlмқ„ мқҪм–ҙ templates/ лҘј л ҢлҚ”л§Ғн•©лӢҲлӢӨ.

# в”Җв”Җ кёҖлЎңлІҢ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
global:
  namespace: dropx
  registry: "192.168.10.100"          # GitLab Container Registry IP
  imageTag: "c93e3869"
  imagePullPolicy: Always
  imagePullSecret: "gitlab-registry-secret"

# в”Җв”Җ ConfigMap в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
config:
  mysqlHost: "mysql.dropx.svc.cluster.local"
  mysqlPort: "3306"
  mysqlDb: "dropx"
  redisHost: "redis.dropx.svc.cluster.local"
  redisPort: "6379"
  appEnv: "production"
  logLevel: "INFO"
  reserveTokenTtlSec: "180"
  orderLockTtlSec: "300"
  metricsPort: "8001"

# в”Җв”Җ Secret (мӢӨ к°’мқҖ м ҲлҢҖ Git м»Өл°Ӣ кёҲм§Җ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# м Ғмҡ© м „ мӢӨ к°’мңјлЎң көҗмІҙ нӣ„ kubectl apply, мқҙнӣ„ REPLACE_ME лЎң лҗҳлҸҢлҰҙ кІғ
secret:
  mysqlUser: "dropx_user"
  mysqlPassword: "REPLACE_ME"
  mysqlRootPassword: "REPLACE_ME"
  jwtSecretKey: "REPLACE_ME"          # openssl rand -hex 32
  registryUser: "root"
  registryPassword: "REPLACE_ME"

# в”Җв”Җ MySQL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
mysql:
  image: "mysql:8.0.36"
  storage: "5Gi"
  storageClass: "local-path"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "800m"
      memory: "1Gi"

# в”Җв”Җ Redis в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
redis:
  image: "redis:7.2.4-alpine"
  storage: "2Gi"
  storageClass: "local-path"
  maxmemory: "400mb"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# в”Җв”Җ Auth Service в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
