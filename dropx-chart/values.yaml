# DropX Helm Values
# 이 파일 하나에서 모든 환경 설정을 관리합니다.
# ArgoCD는 이 values.yaml을 읽어 templates/ 를 렌더링합니다.

# ── 글로벌 ─────────────────────────────────────────────────────────────────
global:
  namespace: dropx
  registry: "192.168.10.100:5050"          # GitLab Container Registry IP
  imagePullPolicy: Always
  imagePullSecret: "gitlab-registry-secret"

# ── ConfigMap ───────────────────────────────────────────────────────────────
config:
  mysqlHost: "mysql.dropx.svc.cluster.local"
  mysqlPort: "3306"
  mysqlDb: "dropx"
  redisHost: "redis.dropx.svc.cluster.local"
  redisPort: "6379"
  appEnv: "production"
  logLevel: "INFO"
  reserveTokenTtlSec: "180"
  orderLockTtlSec: "300"
  metricsPort: "8001"

# ── MySQL ───────────────────────────────────────────────────────────────────
mysql:
  image: "mysql:8.0.36"
  storage: "5Gi"
  storageClass: "local-path"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "800m"
      memory: "1Gi"

# ── Redis ───────────────────────────────────────────────────────────────────
redis:
  image: "redis:7.2.4-alpine"
  storage: "2Gi"
  storageClass: "local-path"
  maxmemory: "400mb"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ── Auth Service ────────────────────────────────────────────────────────────
authService:
  enabled: true          # 이미지 준비 완료 후 true로 변경
  image: "192.168.10.100:5050/root/ci/dropx-auth"
  imageTag: "ee315a86"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "400m"
      memory: "256Mi"

# ── Product Service ─────────────────────────────────────────────────────────
productService:
  enabled: true         # 이미지 준비 완료 후 true로 변경
  image: "192.168.10.100:5050/root/ci/dropx-product"
  imageTag: "c36998ff"
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "400m"
      memory: "256Mi"

# ── Order Service ───────────────────────────────────────────────────────────
orderService:
  enabled: true         # 이미지 준비 완료 후 true로 변경
  image: "192.168.10.100:5050/root/ci/dropx-order"
  imageTag: "0f4b9a2"
  replicas: 1
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "800m"
      memory: "512Mi"

# ── HPA ─────────────────────────────────────────────────────────────────────
hpa:
  minReplicas: 1
  maxReplicas: 5
  cpuUtilization: 60

# ── Ingress ─────────────────────────────────────────────────────────────────
ingress:
  host: "dropx.local"
  className: "nginx"
  proxyReadTimeout: "60"
  proxySendTimeout: "60"
  proxyConnectTimeout: "10"
