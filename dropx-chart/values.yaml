  minReplicas: 1
  maxReplicas: 5
  cpuUtilization: 60

# в”Җв”Җ Ingress в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
ingress:
  host: "dropx.local"
  className: "nginx"
  proxyReadTimeout: "60"
  proxySendTimeout: "60"
  proxyConnectTimeout: "10"